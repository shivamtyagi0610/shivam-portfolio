<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shivam Tyagi — Software Engineer</title>
    <meta name="description"
        content="Software Engineer specializing in Flutter & Dart, currently contributing to MySA — an AI-Personal assistant product.">

    <!-- Open Graph / Social -->
    <meta property="og:type" content="website">
    <meta property="og:title" content="Shivam Tyagi — Software Engineer">
    <meta property="og:description"
        content="Software Engineer specializing in Flutter & Dart, building impactful, production-ready mobile applications.">
    <meta property="og:image" content="assets/images/ic_profile.jpg">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&family=DM+Serif+Display:ital@0;1&display=swap"
        rel="stylesheet">

    <!-- Stylesheet (imports per-component CSS files) -->
    <link rel="stylesheet" href="assets/css/styles.css">
</head>

<body>

    <!-- ============================================================
         Component placeholders. Each <div data-component="..."> is
         replaced at runtime by assets/js/main.js using the matching
         HTML fragment at assets/js/components/<name>/<name>.html.
         ============================================================ -->

    <div data-component="navbar"></div>

    <main>
        <div data-component="hero"></div>
        <div data-component="skills-marquee"></div>
        <div data-component="ai-intelligence"></div>
        <div data-component="projects"></div>
        <div data-component="about"></div>
        <div data-component="services"></div>
        <div data-component="process"></div>
        <div data-component="contact"></div>
    </main>

    <div data-component="footer"></div>
    <div data-component="back-to-top"></div>
    <div data-component="project-drawer"></div>

    <!-- Three.js (classic script — exposes global THREE for AICore3D) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/0.160.0/three.min.js"></script>

    <!-- App entry — boots ComponentLoader then initializes every class -->
    <script type="module" src="assets/js/main.js"></script>
</body>

</html>
